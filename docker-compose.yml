services:
  api:
    build:
      context: .
      dockerfile: packages/api-server/Dockerfile
    env_file:
      - .env

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "3000:3001"
    environment:
      - API_BASE_URL=http://api:3000
    depends_on:
      - api
